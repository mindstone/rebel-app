<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>Rebel Avatar - Static Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      overflow: hidden;
    }
    .avatar-container {
      text-align: center;
    }
    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(145deg, #4a90a4 0%, #2d5a6b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .avatar-icon {
      font-size: 80px;
    }
    .bot-name {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .status {
      font-size: 18px;
      opacity: 0.7;
    }
    .debug-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      opacity: 0.5;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="avatar-container">
    <div class="avatar">
      <span class="avatar-icon">🤖</span>
    </div>
    <div class="bot-name" id="botName">Rebel</div>
    <div class="status">Taking notes...</div>
  </div>
  <div class="debug-info" id="debugInfo">
    Test: static-avatar | Status: loaded
  </div>

  <script>
    // Parse URL params for personalization
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || 'Rebel';
    document.getElementById('botName').textContent = `${name}'s Rebel`;
    
    // Log for debugging
    console.log('[Spike Test] static-avatar.html loaded');
    console.log('[Spike Test] URL:', window.location.href);
    console.log('[Spike Test] Name param:', name);
    
    // Update debug info
    document.getElementById('debugInfo').textContent = 
      `Test: static-avatar | Name: ${name} | Loaded: ${new Date().toISOString()}`;
  </script>
</body>
</html>
