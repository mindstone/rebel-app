# Fly Machines configuration for Rebel Cloud Service
# See https://fly.io/docs/reference/configuration/

app = "rebel-cloud-test"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  IS_CLOUD_SERVICE = "1"
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=1792"
  REBEL_HTTP_RESOLVER = "cares"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  # Single-writer cloud sync is enforced at bootstrap by assertSingleFlyMachineRunning
  # (docs/plans/260509_session_event_delta_sync.md Stage 2 / Decision #4).
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [http_service.http_options]
    idle_timeout = 900

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[mounts]
  source = "rebel_data"
  destination = "/data"
  initial_size = "10gb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

# Cap how many times Fly will auto-restart a crash-looping image before giving up.
# See docs/plans/260510_cloud_image_rollback_defense_in_depth.md Stage B / Decision D2.
# - policy="on-failure" only restarts when the process exits non-zero (the real failure mode).
# - max_retries=5 makes blast radius predictable; pairs with the pre-bootstrap watchdog
#   (Stage C2), which fires per-boot and consumes one of these retries on each crash.
# fly.toml's restart stanza only applies to NEW machines; existing machines are
# migrated in code via cloud-service/src/services/flyRestartPolicyMigration.ts.
[[restart]]
  policy = "on-failure"
  max_retries = 5
