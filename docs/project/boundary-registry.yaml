  - id: bts-preoauth-hook-registration-sites
    category: cross-surface-coupling
    description: >
      Every surface that builds a HeadlessRuntimeConfig must wire the BTS
      preOAuthCallHook to refresh the Codex token
      (DEFAULT_CODEX_AUTH_PROVIDER.getAccessToken()) before OAuth-token
      Anthropic calls. Desktop (src/main/index.ts) and cloud
      (cloud-service/src/bootstrap.ts) must stay in lockstep; a surface that
      drops or stubs the hook body silently regresses BTS token refresh on that
      surface only.
    spec_doc: docs/plans/260526_hotspot-refactor-roadmap/PLAN.md#stage-9-cross-surface-parity-hooks--rescoped-2026-05-28-stale-premise-corrected
    owned_by: src/core/services/headlessRuntime.ts
    match:
      paths:
        - src/main/index.ts
        - cloud-service/src/bootstrap.ts
        - src/core/services/headlessRuntime.ts
        - src/core/services/bts/transports/shared.ts
        - src/core/services/bts/transports/anthropic.ts
        - src/core/services/defaultCodexAuthProvider.ts
        - cloud-service/src/__tests__/bootstrap.preOAuthCallHook.test.ts
      identifiers:
        - preOAuthCallHook
        - registerPreOAuthCallHook
        - getPreOAuthCallHook
        - DEFAULT_CODEX_AUTH_PROVIDER
        - getAccessToken
        - HeadlessRuntimeConfig
        - createHeadlessRuntime
    rationale: >
      The BTS pre-OAuth hook (src/core/services/bts/transports/shared.ts) is a
      process-global registered exactly once, by createHeadlessRuntime
      (headlessRuntime.ts:363) from the required `preOAuthCallHook` field of
      HeadlessRuntimeConfig. TypeScript guarantees the FIELD is supplied, but it
      cannot guarantee the BODY actually refreshes the Codex token: a surface can
      pass `async () => {}` and still compile. PM 260327 originally framed this
      as a desktop/cloud parity gap; both surfaces now wire the identical
      Codex-refresh hook (cloud-service/src/bootstrap.ts ≡ src/main/index.ts).
      Drift mode: a surface drops the `DEFAULT_CODEX_AUTH_PROVIDER.getAccessToken()`
      call (or a new surface builds a HeadlessRuntimeConfig with an empty hook),
      so background/headless BTS turns on that surface stop refreshing the Codex
      token and silently 401 on expiry while every other surface stays green.
      Reviewers must verify each HeadlessRuntimeConfig site's preOAuthCallHook
      body drives the Codex refresh, and that
      cloud-service/src/__tests__/bootstrap.preOAuthCallHook.test.ts (the
      behaviour-pinning parity test) stays green. NOTE: this entry covers the
      Codex-refresh hook only — there is no Claude Max / Anthropic OAuth refresh
      on any surface (tracked separately as FU-9; out of scope here).
    postmortems:
      - docs/plans/260526_hotspot-refactor-roadmap/PLAN.md
      - docs/plans/260330_headless_runtime_consolidation.md

