# Boundary Registry v1
#
# Hand-curated list of cross-boundary contracts whose drift has caused or
# is likely to cause silent regressions. Consumed by scripts/boundary-hints.ts
# during plan / stage review (see CHIEF_ENGINEER/CHIEF_ENGINEER.md § 6.4 BOUNDARY_CHECKLIST.md).
#
# Add entries FROM POSTMORTEMS; do not auto-infer from codebase analysis.
# Each entry represents a demonstrated failure mode backed by at least one
# postmortem. Purpose: answer "which canonical spec doc describes this
# boundary?" so reviewers can grep invariants before approving changes
# that cross it.
#
# Schema (v1):
#   id               string, kebab-case, unique
#   category         enum: mcp-env | mcp-catalog | mcp-timeout |
#                    ipc-schema | cloud-parity | provider-routing |
#                    super-mcp-spawn | auth-boundary | eval-harness |
#                    mcp-resource-routing | cross-surface-port |
#                    (extend as needed)
#   description      one-sentence summary of the boundary
#   spec_doc         path (relative to repo root), optional #anchor.
#                    Script verifies this file exists at load time.
#   owned_by         optional: path or module name of the owning side
#   match:
#     paths          list of globs (Node fs.promises.glob syntax).
#                    ≥1 must resolve to a real repo path or the script
#                    emits a Registry Warning at load.
#     identifiers    list of literal substrings or regex fragments.
#                    Matched case-sensitively against planning-doc text
#                    when --planning-doc is provided.
#     exclude_paths  optional list of globs. PER-FILE filter applied
#                    BEFORE path matching: files matching any
#                    exclude_paths glob are removed from the candidate
#                    set. A file matching BOTH `paths` and `exclude_paths`
#                    is removed for that file only — other include
#                    matches in the same change still fire the entry.
#                    Default: []. Does not affect identifier matching.
#                    Use when a path glob incidentally covers a file
#                    that is known-irrelevant to the boundary (e.g.,
#                    catalog-json changes that happen to land in paths
#                    watched by another boundary).
#   forbidden_terms  optional: strings/regex that MUST NOT appear in the
#                    proposed diff context (e.g., forbidden env-var names
#                    in subprocess env merges). Flagged as HIGH.
#   allowed_terms    optional: canonical names (documentation only).
#   rationale        why the boundary exists and what drift looks like.
#   postmortems      list of filenames in docs-private/postmortems/, primary first.
#   contract_test    optional: NON-EMPTY list of repo-relative test file paths
#                    (`*.test.ts(x)` / `*.spec.ts(x)`) that exercise this seam.
#                    OPT-IN: only entries that declare this are checked by
#                    scripts/check-boundary-contract-coverage.ts
#                    (`validate:boundary-contract-coverage`). The gate asserts
#                    (a) each file exists, (b) each is a test-shaped file
#                    (*.test/spec), and (c) the import-graph floor — the test's
#                    source (parsed via the TS compiler, so commented-out /
#                    string-literal imports do NOT count) imports the entry's
#                    `owned_by` module by relative OR aliased (`@core/...`)
#                    specifier (skipped if `owned_by` is absent). NOTE: this does
#                    NOT assert the test is actually RUN by validate:fast (which
#                    runs only tests/parity + a tiebreaker today) — that
#                    reachability check is a follow-up for enforce-promotion. The
#                    gate is WARN-ONLY today (advisory + exit 0); promote with
#                    --enforce or BOUNDARY_CONTRACT_COVERAGE_ENFORCE=1.
#   contract_test_waiver  optional: string (>=30 chars, no weak markers like
#                    TODO/FIXME/WIP/temp/later) explaining why this entry is
#                    covered by construction (e.g. brand-typed kill-by-
#                    construction) and needs no runtime contract_test. For a seam
#                    with NO contract_test only — declaring BOTH contract_test and
#                    a waiver is a config error (bad-schema).
#
# See BOUNDARY_REGISTRY.md for the full maintenance protocol.

version: 1

boundaries:
  - id: provider-routing-class-central-resolver
    category: provider-routing
    description: All provider routing decisions flow through ProviderRouter.forTurn / forBTS / forSubagent; consumers use plan auth and headers instead of re-deriving provider branches.
    spec_doc: docs/plans/finished/260427_refactor_provider_route_plan.md
    owned_by: src/core/rebelCore/providerRouting.ts
    contract_test:
      - src/core/rebelCore/__tests__/providerRouting.invariants.test.ts
    match:
      paths:
        - src/core/rebelCore/providerRouting.ts
        - src/core/rebelCore/providerRouteDecision.ts
        - src/core/rebelCore/providerAuthPlan.ts
        - src/core/rebelCore/providerRouteHeaders.ts
        - src/core/rebelCore/providerRoutePlan.ts
        - src/core/rebelCore/ensureDirectAnthropicCapable.ts
        - src/core/rebelCore/clientFactory.ts
        - src/core/rebelCore/rebelCoreQuery.ts
        - src/core/rebelCore/queryRouter.ts
        - src/core/rebelCore/agentTool.ts
        - src/core/services/behindTheScenesClient.ts
        - src/core/utils/authEnvUtils.ts
        - src/main/services/agentTurnExecutor.ts
        - src/main/services/queryOptionsBuilder.ts
        - src/main/services/turnErrorRecovery.ts
        - src/main/services/behindTheScenesClient.ts
        - src/main/services/councilService.ts
        - src/main/services/localModelProxyServer.ts
        - src/main/services/promptCacheWarmupService.ts
        - src/main/services/useCaseGeneratorService.ts
        # Stage 6 of docs/plans/260514_openrouter_sonnet_bypass_remediation.md —
        # the provider-aware default resolver introduced in Stage 1 is the
        # canonical answer to "what model should we pick when settings are
        # silent?". Touching this file or its constants changes the entire
        # routing-default semantics, so reviewers must read the spec doc.
        - src/shared/utils/getDefaultModelForProvider.ts
        - src/shared/utils/providerDefaultConstants.ts
      identifiers:
        - ProviderRoutePlan
        - ProviderRouter
        - ProviderRouteDecision
        - DispatchableRouteDecision
        - TerminalRouteDecision
        - kind
        - dispatchPath
        - deriveDispatchPath
        - coerceToRouteTable
        # Stage 6 — provider-aware default resolver (Stage 1 of plan
        # 260514_openrouter_sonnet_bypass_remediation.md).
        - getDefaultModelForProvider
        - getProviderModelDefaults
        - ProviderModelDefaults
        - ANTHROPIC_DEFAULT_WORKING_MODEL
        - ANTHROPIC_DEFAULT_THINKING_MODEL
        - ANTHROPIC_DEFAULT_BACKGROUND_MODEL
        - isDispatchableDecision
        - isTerminalDecision
        - isTerminalRoutePlan
        - validateRouteDecisionShape
        - MalformedRouteDecisionError
        - isProxyDispatch
        - isRouteTableDispatch
        - isDirectDispatch
        - assertDispatchableRoutePlan
        - proxyRuntimeForDecision
        - ProviderAuthPlan
        - selectProviderMode
        - deriveResolvedAuthLabel
        - applyAuthPlanToEnv
        - ensureDirectAnthropicCapable
        - ResolvedTarget
        - createDirectAnthropicClient
        - _resolvedAuth
        - codexConnectivity
        - materializePlanRuntime
        - extractProxyConfig
        - RouteRebuildHint
    forbidden_terms:
      - "startsWith\\('claude'\\)"
      - "'x-codex-turn'"
      - "'x-openrouter-turn'"
      - "process\\.env\\.ANTHROPIC_API_KEY\\s*="
      - "new Anthropic\\("
    rationale: >
      The April 2026 routing bug cascade came from provider routing being
      encoded imperatively at each call site. ProviderRouteDecision is now a
      discriminated union (`kind: dispatchable | terminal`) so terminal route
      decisions cannot silently enter dispatch-only code. Drift mode: a new path
      re-derives active provider/auth/header state instead of consuming
      ProviderRoutePlan, or bypasses the union/validator helpers and reopens
      OpenRouter/Codex/BTS misrouting and cost-attribution bugs.
    postmortems:
      - 260419_prepush_live_api_integration_test_404_postmortem.md
      - 260417_openrouter_adhoc_auth_failure_postmortem.md
      - 260421_openrouter_partial_config_fail_open_postmortem.md

  - id: managed-traffic-zdr-proxy-precedence
    category: provider-routing
    description: Managed OpenRouter connection profiles must resolve through the local proxy so ZDR, provider routing, attribution, and managed allowlists are applied before egress.
    spec_doc: docs-private/postmortems/260601_managed_openrouter_connection_proxy_bypass_zdr_postmortem.md
    owned_by: src/core/rebelCore/clientFactory.ts + src/core/rebelCore/providerRouting.ts + src/core/rebelCore/providerRouteHeaders.ts + src/main/services/localModelProxyServer.ts
    contract_test:
      - src/main/services/__tests__/managedOpenRouterZdrProxyPrecedence.contract.test.ts
    match:
      paths:
        - src/core/rebelCore/clientFactory.ts
        - src/core/rebelCore/providerRouting.ts
        - src/core/rebelCore/providerRouteHeaders.ts
        - src/main/services/localModelProxyServer.ts
      identifiers:
        - createClientForModel
        - profileDecision
        - injectProviderRouting
        - x-zdr
        - openrouter-proxy
        - profileSource
        - openrouter-oauth-token
    rationale: >
      A managed/connection OpenRouter profile uses shared OAuth and no BYOK key;
      dispatching it direct to OpenRouter bypasses the local proxy privacy boundary.
      The resolver must require proxy transport, and the proxy must stamp ZDR,
      provider-routing, attribution, and allowlist enforcement before upstream egress.
    postmortems:
      - 260601_managed_openrouter_connection_proxy_bypass_zdr_postmortem.md

  - id: provider-integrity-guard-symmetry
    category: provider-routing
    description: |
      Provider-integrity guards must derive from a single typed source per concern.
      Admission gating (`turnAdmission.ts`, `authEnvUtils.hasValidAuth`) must consume
      `validateProviderCredentials()` (typed discriminated union, exhaustive switch).
      Auth tagging in `agentTurnExecutor.ts` must consume `resolveTurnAuthLabelFromRoutePlan(plan)`
      (route-truth source). Per-provider inline conditionals (e.g. `activeProvider === 'codex' && !codexConnected`)
      are forbidden everywhere — they were the failure mode that produced the 260429
      disconnect-fallthrough postmortem.
    spec_doc: docs-private/postmortems/260429_codex_disconnected_anthropic_fallthrough_postmortem.md
    owned_by: src/core/utils/validateProviderCredentials.ts
    match:
      paths:
        - src/core/utils/validateProviderCredentials.ts
        - src/core/utils/authEnvUtils.ts
        - src/main/services/turnPipeline/turnAdmission.ts
        - src/main/services/agentTurnExecutor.ts
      identifiers:
        - validateProviderCredentials
        - ProviderCredentialState
        - codexConnectedAtTurnStart
        - hasValidAuth
        - resolveTurnAuthLabelFromRoutePlan
    forbidden_terms:
      # Per-provider inline guards — multiple operand orders
      - "activeProvider\\s*===\\s*['\"]codex['\"]\\s*&&\\s*!\\w*Connected\\w*"
      - "activeProvider\\s*===\\s*['\"]codex['\"]\\s*&&\\s*\\w*Connected\\w*\\s*===\\s*false"
      # Order-flipped: codexConnected first, activeProvider second
      - "!\\s*\\w*Connected\\w*\\s*&&\\s*activeProvider\\s*===\\s*['\"]codex['\"]"
      - "\\w*Connected\\w*\\s*===\\s*false\\s*&&\\s*activeProvider\\s*===\\s*['\"]codex['\"]"
      # OpenRouter equivalents
      - "activeProvider\\s*===\\s*['\"]openrouter['\"]\\s*&&\\s*!\\w*[Tt]oken"
      - "!\\w*[Tt]oken\\s*&&\\s*activeProvider\\s*===\\s*['\"]openrouter['\"]"
      # Direct inline isConnected() checks in admission/executor (any boolean position)
      - "getCodexAuthProvider\\(\\)\\.isConnected\\(\\)\\s*&&"
      - "&&\\s*getCodexAuthProvider\\(\\)\\.isConnected\\(\\)"
      - "!\\s*getCodexAuthProvider\\(\\)\\.isConnected\\(\\)"
    rationale: |
      The 260429 postmortem identified per-provider inline guards drift over time
      and miss cases as providers are added. This entry enforces the dual-gate design:

      1. Admission and capability checks (`turnAdmission.ts`, `authEnvUtils.hasValidAuth()`)
         consume `validateProviderCredentials()` whose discriminated union forces compile-time
         exhaustiveness — adding a new arm is a TypeScript error in every consuming switch.

      2. Auth tagging in `agentTurnExecutor.ts` consumes
         `resolveTurnAuthLabelFromRoutePlan(providerRoutePlan)` because the route plan
         is already the source of truth for transport selection — re-deriving the auth
         label here would risk drift between admission, transport, and ledger.

      Both helpers prevent the 260429 class of "per-provider boolean fall-through" bugs.
    postmortems:
      - 260429_codex_disconnected_anthropic_fallthrough_postmortem.md
      - 260421_openrouter_partial_config_fail_open_postmortem.md

  - id: model-role-resolver-runtime-fallback-fence
    category: provider-routing
    description: Thinking/working/fast runtime model selection must flow through resolveDefaultModelForRole with typed failures; runtime entry points must not hardcode Claude fallback literals.
    spec_doc: docs/plans/260507_model_resolver_and_output_cap_autolearn.md#stage-1--l1-resolver--lint-rule--observable-failure-surface-v2
    owned_by: src/core/rebelCore/modelRoleResolver.ts
    match:
      paths:
        - src/core/rebelCore/modelRoleResolver.ts
        - src/core/rebelCore/modelErrors.ts
        - src/core/rebelCore/agentTool.ts
        - src/core/rebelCore/planningMode.ts
        - src/core/rebelCore/providerRouting.ts
        - src/core/services/agentEventDispatcher.ts
        - src/renderer/features/agent-session/hooks/useAgentSessionEngine.ts
        - src/renderer/features/settings/components/LocalModelSection.tsx
      identifiers:
        - resolveDefaultModelForRole
        - roleResolutionFailure
        - createRoleResolutionModelError
        - agent:role-not-configured
        - Roles needing a model
    rationale: >
      Model defaults previously drifted across three runtime entry points
      (`agentTool`, `planningMode`, `providerRouting`) as hardcoded Claude
      literals. The resolver boundary centralizes role lookup + failure typing;
      drift mode is any new direct fallback in an entry point that bypasses
      the resolver and silently reintroduces provider-coupled defaults.
    postmortems:
      - 260421_openrouter_partial_config_fail_open_postmortem.md
      - 260419_prepush_live_api_integration_test_404_postmortem.md

  - id: learned-output-cap-cascade-coupling
    category: provider-routing
    description: Output-cap auto-learn writes and max-output cascade reads must evolve together; changing one side without the other silently reintroduces repeat 400 invalid_request loops.
    spec_doc: docs/plans/260507_model_resolver_and_output_cap_autolearn.md#stage-3--l2-wire-400-classifier--centralized-dispatcher-cascade-reads-profile-first-v2
    owned_by: src/core/rebelCore/modelLimits.ts
    match:
      paths:
        - src/core/rebelCore/modelLimits.ts
        - src/core/rebelCore/modelErrors.ts
        - src/core/rebelCore/learnedProfileWriter.ts
        - src/core/rebelCore/dispatchLearnedLimitsFromError.ts
        - src/core/rebelCore/agentTool.ts
        - src/core/rebelCore/rebelCoreQuery.ts
        - src/main/services/agentTurnExecutor.ts
        - src/main/services/turnErrorRecovery.ts
      identifiers:
        - profileMaxOutputSource
        - outputTokensSource
        - lastLearnedOutputTokens
        - recordOutputCapOnProfile
        - dispatchLearnedLimitsFromError
        - parseOutputCapFrom400
    rationale: >
      The output-cap learner is only effective when the 400 classifier,
      centralized dispatcher, writer provenance fields, and model-limit cascade
      stay in lockstep. Drift mode: parser learns a cap but cascade ignores
      auto-source fields (or vice versa), causing repeated invalid_request
      retries and non-actionable user errors.
    postmortems:
      - 260421_openrouter_partial_config_fail_open_postmortem.md
      - 260419_prepush_live_api_integration_test_404_postmortem.md

  - id: mcp-workspace-env-propagation
    category: mcp-env
    description: Super-MCP router must inject MCP_WORKSPACE_PATH into every spawned OSS connector subprocess env; must NOT inject REBEL_WORKSPACE_PATH.
    spec_doc: docs/project/MCP_SERVER_STANDARD.md#workspace-path-propagation-oss-connectors
    owned_by: super-mcp/src/clients/stdioClient.ts
    match:
      # Narrowed to stdioClient only — the 260420 bug was in the subprocess
      # spawn path, not in request handlers. The previous super-mcp/src/handlers/**/*.ts
      # glob over-fired on any handler change, including unrelated MCP-apps
      # routing work (e.g. 260412's edits to readResource.ts).
      paths:
        - super-mcp/src/clients/stdioClient.ts
      # Identifiers trimmed to the two specific env-var names. Removed
      # 'workspacePath' (too generic — matches any workspace-path variable)
      # and 'StdioClientTransport' (matches SDK type docs / unrelated code).
      identifiers:
        - MCP_WORKSPACE_PATH
        - REBEL_WORKSPACE_PATH
    forbidden_terms:
      - REBEL_WORKSPACE_PATH
    allowed_terms:
      - MCP_WORKSPACE_PATH
    rationale: >
      OSS subprocess env must stay OSS-branded so our connector fork behaves
      identically to upstream. Drift mode (260420): router writes host env
      name, connector reads OSS env name, nothing matches, workspace path
      silently falls back to .app bundle. Nine Round-1 reviewers missed
      this by not opening the spec doc.
    postmortems:
      - 260420_nano_banana_workspace_path_propagation_postmortem.md
      - 260327_mcp_subagent_inheritance_postmortem.md

  - id: mcp-catalog-bundledconfig-preservation
    category: mcp-catalog
    description: connector-catalog.json bundledConfig fields must be preserved across OSS migrations; dropped fields cause silent config regression.
    spec_doc: docs/project/MCP_SERVER_STANDARD.md
    owned_by: resources/connector-catalog.json
    match:
      paths:
        - resources/connector-catalog.json
        - resources/mcp/**
        - src/main/services/bundledMcpManager.ts
      identifiers:
        - BRIDGE_STATE_PATH
        - MINDSTONE_REBEL_BRIDGE_STATE
        - bundledConfig
        - connector-catalog
        - validateEnvPlaceholderResolvability
        - migrateBundledConnectorsToNpx
        - resolveEnvPlaceholders
        - OSS migration
        - package pin
    rationale: >
      OSS migrations replace the bundled connector with an npm package pin.
      bundledConfig fields (defaults, env templates, feature flags) must
      carry over; the 260417 bug was a direct field drop during migration.
    postmortems:
      - 260417_rebel_oss_bundledconfig_regression_postmortem.md

  - id: super-mcp-passthrough
    category: mcp-resource-routing
    description: |
      super-mcp's `use_tool` outer response block must hoist spec-conformant
      `_meta.ui` and `structuredContent` from the inner downstream tool_result,
      and namespace its own metadata under `_meta.superMcp` and
      `_meta.materialization` (per
      docs/project/SUPER_MCP_PASSTHROUGH_CONTRACT.md). Outer metadata must be
      constructed through the single egress helper, with bypass paths (dry-run,
      continuation, staged) identified under `_meta.superMcp`. The model-facing
      JSON envelope inside `content[0].text` MUST remain unchanged for
      backward-compat.
    spec_doc: docs/project/SUPER_MCP_PASSTHROUGH_CONTRACT.md
    owned_by: super-mcp/src/handlers/useTool.ts
    match:
      paths:
        - super-mcp/src/handlers/useTool.ts
        - super-mcp/src/handlers/materializeOutput.ts
        - src/core/rebelCore/mcpClient.ts
        - src/core/rebelCore/types.ts
        - src/core/rebelCore/agentLoop.ts
        - src/core/rebelCore/agentMessageAdapter.ts
        - src/core/rebelCore/hookPipeline.ts
        - src/main/services/agentMessageHandler.ts
        - src/shared/types/agent.ts
        - src/shared/ipc/schemas/agent.ts
        - src/renderer/features/agent-session/components/McpAppView.tsx
      identifiers:
        - processCallToolResult
        - ToolExecutionResult
        - tool_use:result
        - toToolResultContent
        - toToolResultBlock
        - extractInnerPassthroughMeta
        - buildOuter
        - applyOuterMeta
        - SuperMcpTelemetryMeta
        - MaterializationMeta
        - OuterPassthroughMeta
        - structuredContent
        - _meta.ui
        - _meta.superMcp
        - _meta.materialization
        - unwrapUseToolEnvelopeMeta
        - parseUseToolEnvelopeJson
    forbidden_terms:
      # Re-introducing a renderer-side regex/JSON.parse fallback for
      # _meta.ui / structuredContent indicates the contract has regressed.
      # The canonical place for the envelope-aware unwrap is
      # agentMessageHandler.ts (Method 0); other consumers must read off the
      # outer block.
      - "JSON\\.parse.*content\\[0\\]\\.text.*structuredContent"
    rationale: |
      The 2026-05-07 email-compose pre-fill bug was the third super-mcp
      envelope-shape regression in five months (after
      260417_materialisation_non_text_bypass and
      260427_super_mcp_iserror_propagation). All three had the same shape: a
      spec-conformant outer-block field (`_meta.ui`, `structuredContent`,
      `isError`) was visible inside the JSON envelope text but invisible
      structurally on the outer block, so spec-compliant consumers silently
      missed it.

      This entry locks the structural contract documented in
      SUPER_MCP_PASSTHROUGH_CONTRACT.md. Drift mode: a future super-mcp
      refactor strips a hoisted field from any egress path (success,
      materialised, safety-net, dry-run, continuation, or _rebel_staged), adds
      a new return path that bypasses the single-egress constructor, or moves
      the inner `_meta.ui` / `structuredContent` extraction to AFTER
      materialisation rewrites the inner content (where it would be lost).
      Reviewers must verify that spec-conformant outer-block fields are
      hoisted through a single egress path, and any new consumer reads
      passthrough fields off the outer block (not via a regex sniff of
      `content[0].text`).
    postmortems:
      - 260417_materialisation_non_text_bypass_postmortem.md
      - 260427_super_mcp_iserror_propagation_postmortem.md

  - id: mcp-apps-package-identity-routing
    category: mcp-resource-routing
    description: MCP-apps resource URIs (ui://...) must preserve sourcePackageId through the main↔super-mcp↔renderer routing chain; dropping the identity silently routes to the wrong instance or returns -33010.
    spec_doc: docs-private/postmortems/260412_mcp_apps_resource_routing_postmortem.md
    owned_by: src/main/ipc/mcpAppsHandlers.ts
    match:
      paths:
        - src/main/services/agentMessageHandler.ts
        - src/main/ipc/mcpAppsHandlers.ts
        - src/shared/ipc/channels/mcpApps.ts
        - src/shared/types/agent.ts
        - src/shared/ipc/schemas/agent.ts
        - src/renderer/features/agent-session/components/McpAppView.tsx
        - super-mcp/src/catalog.ts
        - super-mcp/src/handlers/readResource.ts
      exclude_paths:
        # connector-catalog.json changes legitimately mention sourcePackageId
        # without carrying any routing logic; suppress the identifier-only path
        # when the only changed file is the catalog.
        - resources/connector-catalog.json
      identifiers:
        - sourcePackageId
        - mcpAppInstance
        - registerResourceUris
        # Plain substring (not anchored) — regex engine compiles with /g only,
        # so ^ would anchor to document start and never fire. 'ui://' is
        # specific enough on its own given MCP-apps URI scheme uniqueness.
        - 'ui://'
    rationale: >
      MCP-apps register resource URIs with an app-family prefix
      (ui://google-workspace/...), but per-instance routing requires
      sourcePackageId + instance identity to be threaded from the
      agent message through main IPC, super-mcp, and the renderer
      view. 260412 bug: a single dropped field in agentMessageHandler
      caused every ui:// resource request to return -33010 because
      the super-mcp catalog lookup had no package context. When this
      entry fires, reviewers must check each consumer preserves
      sourcePackageId along the full routing chain.
    postmortems:
      - 260412_mcp_apps_resource_routing_postmortem.md

  - id: mcp-apps-bidirectional-trust
    category: mcp-app-trust
    description: MCP Apps iframe→host bidirectional messages must use host-derived provenance, active nonce freshness, rate limits, first-use permissions, and no-content structured logging.
    spec_doc: docs/project/MCP_APPS_BIDIRECTIONAL_TRUST_CONTRACT.md
    owned_by: src/renderer/features/agent-session/components/McpAppView.tsx + src/main/ipc/mcpAppsHandlers.ts
    match:
      paths:
        - src/renderer/features/agent-session/components/McpAppView.tsx
        - src/main/ipc/mcpAppsHandlers.ts
        - src/shared/ipc/channels/mcpApps.ts
        - src/shared/types/agent.ts
        - src/main/services/agentMessageHandler.ts
      identifiers:
        - IframeProvenanceEnvelope
        - IframeMessageMethod
        - IframeMessageEnvelope
        - PermissionScope
        - TrustBoundaryRejectionReason
        - TrustBoundaryRejection
        - RateLimitTier
        - TrustBoundaryLogEvent
        - ui/initialize
        - ui/sendMessage
        - ui/updateModelContext
        - ui/resize
        - tools/call
        - mcp:send-message
        - mcp:update-context
        - nonce
        - iframeInstanceId
        - stale_nonce
        - permission_denied
        - attemptedContentBytes
        - sourcePackageFamily
        - sourcePackageHash
        - sourcePackageId
    rationale: >
      Phase C completes MCP Apps bidirectional support by letting iframe code
      influence the conversation and model context. That crosses a stricter
      trust boundary than read-only rendering: provenance must be derived from
      host state (not iframe params), each iframe load must prove freshness with
      an active nonce, conversation-mutating methods require first-use
      permission, and rejection logs must never leak content. This entry is the
      preventive sibling of the MCP Apps sourcePackageId routing boundary and
      the super-mcp passthrough contract: dropped identity or structural fields
      at either boundary silently mis-scope app behavior.
    postmortems:
      - 260412_mcp_apps_resource_routing_postmortem.md
      - 260417_materialisation_non_text_bypass_postmortem.md
      - 260427_super_mcp_iserror_propagation_postmortem.md

  - id: mcp-connector-request-timeout
    category: mcp-timeout
    description: When bumping an OSS connector package pin or proposing timeout-related changes, verify the connector's outbound-API timeout defaults against realistic 95th-percentile latency; long-running APIs (image/video gen) need realistic defaults plus env-var overrides.
    spec_doc: docs-private/postmortems/260421_nano_banana_request_timeout_postmortem.md
    owned_by: upstream (mindstone/mcp-servers) — host-side surface is resources/connector-catalog.json
    match:
      paths:
        # Path-match only on catalog pin changes (where an OSS connector version
        # is bumped in this repo). The actual timeout code lives in the OSS
        # submodule / upstream repo, not here — so broad super-mcp globs would
        # over-fire on any unrelated super-mcp change. Identifier-matching
        # (below) covers planning docs that propose timeout work directly.
        - resources/connector-catalog.json
      identifiers:
        - REQUEST_TIMEOUT_MS
        - DEFAULT_GEMINI_REQUEST_TIMEOUT_MS
        - DEFAULT_BRIDGE_REQUEST_TIMEOUT_MS
        - NANO_BANANA_GEMINI_TIMEOUT_MS
        - NANO_BANANA_BRIDGE_TIMEOUT_MS
    rationale: >
      Template _default_ 30s was inherited by every connector without
      measurement. Gemini Pro image gen takes 30-120s synchronously; the
      30s cap aborted mid-call with a generic error. Fix pattern (260421):
      split bridge vs upstream timeouts, raise upstream default to 180s,
      expose env override with input validation, compose caller AbortSignal
      via AbortSignal.any().
    postmortems:
      - 260421_nano_banana_request_timeout_postmortem.md

