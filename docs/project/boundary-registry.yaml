  - id: spaces-write-realpath-boundary
    category: file-system-trust-boundary
    description: |
      Every space-mutating fs.writeFile / fs.rename / fs.mkdir / fs.copyFile / fs.unlink
      that takes a workspace-relative spacePath must call assertSpaceWriteSafe(target, workspaceRoot)
      before the I/O call. The realpath of the resolved target must remain inside the workspace,
      and protected root names (e.g. Resources, .app bundle dirs, /Applications, /System,
      /Library, Windows system roots) must be denied via the central isProtectedRootName predicate.
    spec_doc: docs/plans/260423_symlink_write_through_into_app_bundle.md
    owned_by: src/main/services/spaceWriteSafety.ts
    match:
      paths:
        - src/main/services/spaceService.ts
        - src/main/services/spaceWriteSafety.ts
        - src/main/services/__tests__/spaceWriteSafety.test.ts
      identifiers:
        - assertSpaceWriteSafe
        - WriteOutsideWorkspaceError
        - isProtectedRootName
        - isUnderWin32Path
        - excludedRootNames
        - addDescriptionToFrontmatter
        - attemptMechanicalFrontmatterRepairOnDisk
        - migrateLegacyAgentsMd
        - updateSpaceFrontmatter
    rationale: |
      The 2026-04-21 incident saw a conflicted-copy symlink inside the workspace point
      at the installed .app bundle's Resources/ directory; a downstream space-frontmatter
      writer dereferenced and wrote through it, surfacing as a "Permission denied" toast
      and silently corrupting bundled fixtures on disk. The spaceWriteSafety helpers landed
      with brand-new realpath + protected-root + win32-system-root denylist primitives,
      but the structural mitigation only holds if every write entry-point in spaceService.ts
      consumes assertSpaceWriteSafe with the realpath of the resolved target, and every
      protected-root check consumes isProtectedRootName (rather than duplicating a string
      Set inline). Drift mode: a new write entry-point in spaceService.ts (or a new caller
      of an existing write helper) skips the assertion; or the excludedRootNames Set is
      cloned inline somewhere instead of consuming isProtectedRootName; or fs.realpath is
      called manually with non-tolerant error handling that swallows ENOENT/EACCES on
      legitimate workspace-inside paths. Reviewers must verify every fs.writeFile /
      fs.rename / fs.mkdir / fs.copyFile / fs.unlink call site in spaceService.ts is
      preceded by assertSpaceWriteSafe and that the protected-root list flows from the
      helper rather than being duplicated.
    postmortems:
      - 260423_symlink_write_through_bundle_postmortem.md

  - id: cloud-image-rollback-defense-in-depth
    category: cloud-parity
    description: Cross-boot image rollback contract — every write to bootStateStore / lastKnownGoodImageTagStore / quarantinedTagsStore, every Fly machine config update on the cloud, and every desktop revert call must flow through the canonical helpers (writeBootPending, scheduleBootSuccessMarker, applyImageRollback) with a writerTag so the pre-bootstrap watchdog can reason about prior-boot state.
    spec_doc: docs/plans/260510_cloud_image_rollback_defense_in_depth.md
    owned_by: cloud-service/src/preBootstrapWatchdog.ts
    match:
      paths:
        - cloud-service/src/preBootstrapWatchdog.ts
        - cloud-service/src/entry.ts
        - cloud-service/src/services/bootSuccessMarker.ts
        - cloud-service/src/services/bootStateStore.ts
        - cloud-service/src/services/lastKnownGoodImageTagStore.ts
        - cloud-service/src/services/quarantinedTagsStore.ts
        - cloud-service/src/services/forcedBootCrash.ts
        - cloud-service/src/services/flyRestartPolicyMigration.ts
        - cloud-service/src/selfUpdateScheduler.ts
        - cloud-service/src/server.ts
        - cloud-service/fly.toml
        - cloud-service/Dockerfile
        - cloud-service/build.mjs
        - src/core/services/flyApiClient.ts
        - src/core/services/schemaFingerprint.ts
        - src/main/services/cloud/desktopLkgCache.ts
        - src/main/ipc/cloudHandlers.ts
      identifiers:
        - applyImageRollback
        - writerTag
        - bootStateStore
        - writeBootPending
        - clearBootPending
        - readBootState
        - scheduleBootSuccessMarker
        - bootSuccessMarker
        - lastKnownGoodImageTagStore
        - quarantinedTagsStore
        - addRejected
        - readActive
        - preBootstrapWatchdog
        - desktopLkgCache
        - readDesktopLkgCache
        - writeDesktopLkgCache
        - schemaFingerprint
        - REBEL_FORCE_BOOT_CRASH
        - IS_CI_SMOKE_TEST
        - REBEL_BOOT_GRACE_MS
        - cloud:fetch-lkg-image
        - cloud:revert-to-last-known-good
        - default-lkg.json
        - flyRestartPolicyMigration
        - desktop-revert
        - watchdog-rollback
    forbidden_terms:
      # The watchdog/rollback path must never bypass applyImageRollback or
      # write boot/LKG state outside the canonical stores. Any direct
      # machines.update PATCH or hand-rolled JSON.stringify into the
      # state files would reopen the race the cross-boot state machine
      # exists to close.
      - "machines/\\$\\{[a-zA-Z]+\\}/update"
      - "writeFileSync\\([^,]+,\\s*JSON\\.stringify\\([^)]*bootPending"
      - "writeFileSync\\([^,]+,\\s*JSON\\.stringify\\([^)]*last-known-good"
    rationale: >
      Hot-fix 222189772 (March 2026) shipped after a bad cloud image silently
      crashed in a tight loop, taking down customer clouds with no automated
      recovery. Defense-in-depth was layered in over Stages 0-F: a Fly
      `[[restart]]` policy caps the crash loop, a pre-bootstrap watchdog
      checks `bootStateStore` before letting `server.ts` import, and
      `applyImageRollback` is the single chokepoint for every machine image
      change (with `writerTag` proving which subsystem initiated the change
      for postmortems). Drift modes: (1) a new code path patches the Fly
      machine config directly instead of routing through `applyImageRollback`,
      so the rollback contract (image + cmd + auto_destroy) is partially
      applied; (2) a new state write skips `bootStateStore`/`bootSuccessMarker`
      and the watchdog can no longer prove "this boot crashed"; (3) the
      scheduler's quarantine guard is bypassed and a tag the watchdog
      rolled away from is immediately re-installed; (4) the desktop
      `cloud:revert-to-last-known-good` channel grows automation paths that
      can fire without `confirmedByUser:true`, losing the user-confirmation
      invariant. Reviewers must verify every machine-config mutation flows
      through `applyImageRollback`, every state file write uses the
      canonical store wrapper, and the desktop revert handler keeps its
      Zod-enforced confirmation flag.
    postmortems:
      - 260505_cloud_shim_logger_import_break_postmortem.md
      - 260220_cloud_platformconfig_lazy_init_startup_crash_postmortem.md

  - id: eval-per-tier-identity-encoding
    category: eval-harness
    description: |
      Per-tier identity for eval bundles uses the `profile:<id>` prefix encoding
      (same as main-app `behindTheScenesModel`); the resolver keys on profile ID.
      Bare model strings are **inert** — they NEVER match a local profile, even
      when exactly one profile has the same `model`; the resolver emits a one-
      shot `console.warn` with the corresponding `profile:<id>` migration line
      and returns `null`. This eliminates the silent-injection of local app-
      settings state into bundle identity (see `260514_eval_collapse_degraded_propagation`
      postmortem). The analyzer variant key NEVER includes `profileId` — profile
      identity is metadata-only, never key-influencing.
    spec_doc: docs/plans/260511_eval_per_tier_profile_refactor.md
    supersession_note: |
      The 260511 plan's "bare-model multi-match throws" semantics are
      superseded by 260514 Stage B's warn-and-null. Bare strings are now
      inert regardless of match count; `profile:<id>` is the only path
      to a local profile. See `docs/plans/260514_eval_bundle_reproducibility_hardening.md` § Stage B.
    owned_by: evals/knowledge-work-bootstrap.ts
    match:
      paths:
        - evals/knowledge-work-bootstrap.ts
        - evals/knowledge-work.ts
        - evals/analyze-knowledge-work-types.ts
        - evals/analyze-knowledge-work-aggregate.ts
        - evals/shared.ts
        - evals/connector-build.ts
        - src/shared/utils/modelChoiceCodec.ts
      identifiers:
        - resolveTierProfile
        - resolveBundleProfiles
        - assertActivatableBundle
        - resolveTierCredentialStatus
        - resolveBareModelCredentialStatus
        # Drift sentinel: re-introduction of the legacy single-provider guard
        # name. The function was removed 2026-05-12 per
        # docs/plans/260512_eval_per_tier_provider_activation.md.
        - assertSingleProviderAcrossTiers
        - EvalRunBundle
        - resolvedProfiles
        - getResolvedTierMetadata
        - deriveModelVariantKey
        - canonicalizeReasoningEffort
        - decodePrefixed
        - EvalTierChoice
      forbidden_terms:
        - 'profiles\.find\(.*\.model ==='
        - 'findProfile\(name\)'
        - '(?:parts|keyParts)\.push\([^\n)]*\bprofileId\b[^\n)]*\)|variantKey\s*(?:=|\+=)[^\n]*\bprofileId\b'
        # 260512 trim: drift sentinels for the legacy single-provider guard.
        - '\bassertSingleProviderAcrossTiers\b'
        - '\bproviders\.size\s*<=\s*1\b'
        - 'Per-tier provider activation is not yet implemented'
        # Guard the scalar AppSettings.activeProvider contract (260503).
        # Stage 2 of the deferred work MUST NOT add a parallel per-tier
        # activeProvider field; per-tier identity is metadata-only.
        - 'add a parallel activeProvider'
    rationale: |
      The 2026-05-11 V4 Pro overnight eval incident: two Together V4 Pro profiles
      shared `model: 'deepseek-ai/DeepSeek-V4-Pro'` but differed in
      `reasoningEffort`. The legacy `findProfile(name)` resolver in
      `evals/knowledge-work-bootstrap.ts:838-847` did
      `profiles.find(p => p.model === name)` and silently returned the FIRST
      match, routing both tiers to the same effort even when the operator
      intended per-tier disambiguation. The structural fix harmonises with the
      main-app `behindTheScenesModel` `profile:<id>` wire format
      (`src/shared/utils/modelChoiceCodec.ts:32-58`): the resolver parses the
      prefix and keys on profile ID. **As of 2026-05-14 Stage B (see below)
      the bare branch is inert + warn for ALL match counts (zero, one, or
      many) — superseding the original 260511 multi-match-throw semantics
      to also catch the silent-injection vector for the one-match case.**
      Single-pass resolution (`resolveBundleProfiles` at the top of
      `buildEvalRunConfig`) keeps the resolver behaviour predictable and
      avoids lazy re-throws from deep predicate paths.

      The analyzer variant key (`deriveModelVariantKey` at
      `evals/analyze-knowledge-work-aggregate.ts:190-205`) MUST NOT include
      `profileId`. Profile IDs are local-ephemeral (machine-specific,
      settings-reset-volatile); including them in the bucketing key fragments
      longitudinal comparability across machines/runs. Profile identity is
      metadata-only — surfaced in `modelVariantLabel` (display) and
      `fullConfigLine` (Configuration column) but never in the bucketing key.

      The `model` field carried by `ResolvedTierMetadata` MUST be the resolved
      provider-model string (e.g. `'deepseek-v4-pro'`), NOT the encoded CLI
      string (`'profile:<id>'`). The encoded form is the resolver INPUT; the
      `model` field is the resolver OUTPUT. Violating this invariant silently
      back-doors profile IDs into the analyzer variant key.

      Drift mode: a future agent re-introduces lazy `profiles.find(p => p.model === name)`
      somewhere in eval setup, or adds `profileId` to the variant key as
      "extra disambiguation", or writes raw CLI strings into result-file
      `metadata.model` fields. `forbidden_terms` flags the first two patterns
      at plan-review time; the Stage 4 full-ingestion unit test in
      `evals/__tests__/analyze-knowledge-work-aggregate.test.ts` is the
      durable code-level enforcement against profileId-in-key.

      **Important caveat on enforcement:** `scripts/boundary-hints.ts` scans
      planning-doc text for `forbidden_terms`, NOT diff contents. The registry
      entry is reviewer guidance during plan reviews; durable enforcement is
      the unit-test suite.

      **2026-05-12 update — per-tier activation (260512 trim):**
      `assertSingleProviderAcrossTiers` was replaced with
      `assertActivatableBundle` (`evals/knowledge-work-bootstrap.ts:743+`),
      a per-tier credential preflight that delegates to
      `resolveProfileApiKey` for openai/google/together/cerebras profiles,
      and special-cases anthropic, openrouter, local, and Codex-subscription
      paths to mirror runtime auth resolution. This unblocked mixed-provider
      bundles (Bundle 4 = Anthropic-thinking + OpenAI-working + OpenAI-BTS).
      The runtime was already per-tier-correct; the assertion was the only
      bottleneck. See `docs/plans/260512_eval_per_tier_provider_activation.md`
      § Stage 1 (TRIMMED) for the synthesis and root-cause confirmation
      (`__virtual-thinking` profile collision). The deferred follow-up
      (manifest enrichment, schema bump, verifier extension) is documented
      in the same plan's "DEFERRED" section.

      **2026-05-14 update — bare-string inertness (Stage B of 260514 hardening):**
      The 260511 plan's "bare-model multi-match throws" semantics is
      **superseded**. Bare strings are now inert at the resolver regardless
      of match count — `resolveTierProfile` returns `null` and emits a one-
      shot `console.warn` with the `profile:<id>` migration line(s) when
      any local profile shares the bare model name. The `findProfile`
      fallback in `buildEvalRunConfig` (formerly `:1290`) is gone for the
      same reason. `profile:<id>` is now the only path to a local profile.
      This eliminates the silent-injection of local app-settings state
      (`localModel.profiles`, `customProviders`, `providerKeys`) into
      bundle identity that contaminated 33 result files in the gpt-5.4
      baseline. See `docs/plans/260514_eval_bundle_reproducibility_hardening.md`
      § Stage B and `docs-private/postmortems/260514_eval_collapse_degraded_propagation.md`.
    postmortems:
      - 260511_eval_per_tier_profile_refactor.md
      - 260512_eval_per_tier_provider_activation.md
      - 260514_eval_collapse_degraded_propagation.md

