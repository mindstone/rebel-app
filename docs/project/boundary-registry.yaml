  - id: hermetic-eval-config-source-of-truth
    category: eval-harness
    description: >
      Eval CLI inputs flow exclusively through (HermeticEvalConfig file, process.env).
      No code path may read ~/Library/Application Support/mindstone-rebel/app-settings.json
      from inside a running eval invocation. The one legitimate read is
      scripts/eval/capture-keys.ts (operator-side, run once per credential
      rotation).
    spec_doc: docs/plans/260518_hermetic_eval_config_refactor.md
    owned_by: evals/configs/loader.ts
    # PRIMARY protection: any edit to these paths triggers the Spec Reader
    # hint, requiring the agent to read this plan's intent before proceeding.
    match:
      paths:
        - evals/configs/types.ts
        - evals/configs/loader.ts
        - evals/configs/*.json
        - evals/knowledge-work-bootstrap.ts
        - evals/knowledge-work.ts
        - evals/knowledge-work-setup.ts
        - evals/setup-env-evals.ts
        - evals/shared.ts
        - evals/memory-update-quality.ts
        - evals/memory-update-ab.ts
        - evals/rebel-core-loop.ts
        - evals/safety-prompt.ts
        - evals/auto-continue.ts
        - evals/watchdog-judge.ts
        - evals/narration.ts
        # Broad BTS surface coverage — any new harness touching credentials
        # should be in evals/*.ts and will trigger hint.
        - evals/*.ts
        - scripts/eval/capture-keys.ts
        - scripts/eval/snapshot-live-settings.ts
      identifiers:
        - HermeticEvalConfig
        - loadHermeticEvalConfig
        - resolveCredentialsFromEnv
        - resolveEvalRun
        - hermeticConfig
    # forbidden_terms scans planning-doc PROSE only. Useful for catching
    # "we should re-add EVAL_APP_SETTINGS_PATH" in a future plan; NOT for
    # catching code drift. Code drift is caught by the match.paths trigger.
    forbidden_terms:
      - "EVAL_APP_SETTINGS_PATH"
      - "resolveAppSettingsPath\\("
      - "\\.env\\.evals"
      - "\\.config\\.defaults\\.json"
    # allowed_terms is documentation-only per registry schema (NOT consumed
    # by scripts/boundary-hints.ts for path-glob scoping). Retained as inline
    # guidance for human reviewers.
    #
    # `scripts/eval/capture-keys.ts` and `scripts/eval/snapshot-live-settings.ts`
    # ARE intentionally in `match.paths` above. They are the legitimate
    # operator-side reads of `app-settings.json` (one-shot key-capture and
    # diagnostic snapshot, respectively). Edits to them SHOULD fire the
    # Spec Reader hint so future agents read this plan before changing the
    # only sanctioned operator-side reads.
    #
    # The line in the sand for OTHER paths (i.e. anything inside `evals/**`
    # or new harnesses) is the `resolveAppSettingsPath\(` and
    # `EVAL_APP_SETTINGS_PATH` entries in `forbidden_terms` above, which
    # scan planning-doc prose at CHIEF_ENGINEER review time.
    allowed_terms:
      - "resolveAppSettingsPath # only inside scripts/eval/*.ts (capture-keys, snapshot-live-settings)"
    rationale: >
      The 260518 hermetic eval config refactor moved eval inputs onto a typed
      HermeticEvalConfig + process.env boundary. Reverting any consumer to read
      `~/Library/.../app-settings.json` from inside a running eval reopens the
      hidden-state coupling failure modes that 260503 closed at the translator
      OUTPUT and that this plan closes at the translator INPUT.
    postmortems:
      - 260503_kw_eval_infra_robustness.md  # planning doc; treat as the
                                            # postmortem-equivalent.

  - id: cross-surface-coupling
    category: cross-surface-coupling
    description: |
      Files under `cloud-service/**` and `mobile/**` must not import from
      `@main/*`. Cross-surface coupling re-introduces the de-electronification
      drift class (cloud and mobile transitively pulling Electron-aware code).
      Shared logic belongs in `@core/*` via boundary interfaces so it runs on
      all three surfaces. Catches BOTH static `import { x } from '@main/...'`
      and dynamic `await import('@main/...')` forms via the tsx-script
      ratchet at `scripts/check-cross-surface-imports.ts` (primary,
      `validate:fast`) and `@typescript-eslint/no-restricted-imports` in
      `eslint.config.mjs` (secondary, dev-loop static only).
    spec_doc: docs/plans/260514_surface_capabilities_and_quick_wins.md
    owned_by: scripts/check-cross-surface-imports.ts
    match:
      paths:
        - scripts/check-cross-surface-imports.ts
        - scripts/__tests__/check-cross-surface-imports.test.ts
        - eslint.config.mjs
        - cloud-service/src/bootstrap.ts
        - cloud-service/src/routes/slackWebhook.ts
        - cloud-service/src/routes/mcp.ts
        - cloud-service/src/routes/auth.ts
        - cloud-service/src/__tests__/diagnosticsRouteCloudHandler.test.ts
      identifiers:
        - findCrossSurfaceViolations
        - check-cross-surface-imports
        - validate:cross-surface-imports
        - '@main/settingsStore'
        - '@main/services/agentTurnExecutor'
        - '@main/services/coreStartup'
        - '@main/services/safety'
        - '@main/services/inboxStore'
        - '@main/ipc/cloudIpcHandlers'
        - '@main/services/toolSafetyService'
        - '@main/services/localModelProxyServer'
        - '@main/services/bundledMcpCloudRegistration'
        - '@main/ipc/diagnosticsHandlers'
    rationale: |
      The de-electronification programme (`docs/plans/260330_strengthen_de_electronification.md`)
      requires `cloud-service/**` and `mobile/**` to consume only `@core/*`
      boundary interfaces. Each existing `@main/*` import is a deferred
      migration — the allowlist captures the genuine current coupling and
      shrinks as those services move into core. Drift mode: a new `@main/*`
      import lands in cloud or mobile (especially as a dynamic `import()` —
      ESLint's `no-restricted-imports` does NOT cover those, so the tsx
      script is the canonical enforcement). The allowlist uses exact
      `(file, specifier)` pairs so adding a NEW specifier to an already-
      allowlisted file still fires (closes the file-level bypass class).
      Reviewers must verify any change touching the allowlist names a real
      migration that justifies the addition, and that the per-line
      `/* eslint-disable-next-line @typescript-eslint/no-restricted-imports */`
      comment is present at each static-import site for in-source review.
    postmortems:
      - docs/plans/260330_strengthen_de_electronification.md
      - docs/plans/260514_surface_capabilities_and_quick_wins.md

