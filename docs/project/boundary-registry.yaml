      - clearCloudInstanceLocally
      - cloudTeardownGeneration
      - cloudInstanceLocalModeDriftSelectors
    rationale: >
      REBEL-568 exposed a sticky desktop state caused by multiple call sites
      writing cloudInstance status fields with inconsistent success/failure
      semantics. Drift mode: a future change writes lastKnownStatus, lastError,
      or lastSyncedAt via updateSettings outside the reconciler/adapter path,
      bypassing typed error categories, auto-clear-on-success, asymmetric
      lastSyncedAt semantics, broadcasts, and Sentry transition hooks.
      The 260608 recurrence extended the same single-writer problem to the full
      local transition: only clearCloudInstanceLocally() in
      src/main/ipc/cloudHandlers.ts may persist mode:'local' and clear
