  - id: local-openai-compatible-translation
    category: provider-routing
    description: |
      OpenAI-compatible message translation invariants are shared across BOTH
      translator surfaces:
        1) desktop proxy path (`src/main/services/localModelProxyServer.ts`)
        2) core client path (`src/core/rebelCore/clients/openaiTranslators.ts`)

      Assistant-history `reasoning_content` replay is destination-gated through
      `supportsReasoningReplay` (threaded via modelClient StreamParams/CreateParams
      and runAgentLoop opts). Translators must emit reasoning replay only when the
      flag is true, must preserve assistant text/tool ordering, and must coalesce
      `thinking` + `thinking_delta` into one outbound `reasoning_content` string
      per assistant message.

      Post-finish streaming invariant: if `reasoning_content` arrives after
      `finish_reason`, buffer and flush before stop with hard caps
      (256KB / 1000 chunks / active 30s timer) and degraded-status signaling on cap hit.
    spec_doc: docs/plans/260516_ds4_local_model_integration_and_evals.md#stage-4--reasoning-content-multi-turn-replay-correctness--both-translators-lands-before-stage-1
    owned_by: src/main/services/localModelProxyServer.ts
    match:
      paths:
        - src/main/services/localModelProxyServer.ts
        - src/main/services/__tests__/localModelProxyServer.translate.test.ts
        - src/core/rebelCore/clients/openaiTranslators.ts
        - src/core/rebelCore/clients/openaiClient.ts
        - src/core/rebelCore/clients/__tests__/openaiTranslators.test.ts
        - src/core/rebelCore/modelClient.ts
        - src/core/rebelCore/agentLoop.ts
        - src/core/rebelCore/rebelCoreQuery.ts
        - src/core/rebelCore/agentTool.ts
        - src/shared/utils/reasoningCapability.ts
      identifiers:
        - supportsReasoningReplay
        - translateMessagesToOpenAI
        - reasoning_content
        - computeSupportsReasoningReplay
        - getThinkingRetentionTurns
        - runAgentLoop
        - processStreamChunk
        - flushLateReasoningBuffer
        - late-reasoning-buffer-cap
    rationale: |
      Stage 4 of the DS4 integration plan fixed a dual-translator drift class:
      assistant `thinking` blocks were preserved in Rebel history but silently
      dropped from outbound OpenAI-compatible history, collapsing DS4 KV-cache
      hit-rate and risking HTTP 400s on strict-replay destinations. The same
      contract spans both local proxy translation and core-client translation;
      enforcing one side only reopens regressions in eval-path or runtime-path
      depending on which translator drifts first.

      The late-reasoning buffer limits are also part of this boundary. Without
      caps and active post-finish timeout, a provider that stalls after
      `finish_reason` can hold the stream open indefinitely or cause unbounded
      buffer growth. Reviewers must verify cap-hit degradations are observable
      (`degraded-status` + structured logs) and buffered reasoning is never
      silently dropped.
    postmortems:
      - docs-private/investigations/260516_ds4_reasoning_content_replay_validation.md

