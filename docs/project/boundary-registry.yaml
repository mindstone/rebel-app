  - id: composer-tiptap-markdown-overrides
    category: editor-wrapper
    description: Composer wraps @tiptap/markdown and overrides Document/Paragraph/HardBreak renderMarkdown via per-extension lookup; brittle to upstream serializer changes and to "build a new editor surface" work that bypasses the shared factory.
    spec_doc: docs/plans/260501_composer_tiptap_atmention_bugfix.md
    owned_by: src/renderer/features/composer/utils/composerEditorFactory.ts
    match:
      paths:
        # Repo-resolvable paths only (per boundary-hints.ts:107-114). Upstream
        # @tiptap/markdown surfaces live in node_modules and would fail
        # registry validation; the contract test is the loud-failure detector
        # if they drift.
        - package.json
        - src/renderer/features/composer/utils/composerEditorFactory.ts
        - src/renderer/features/composer/utils/composerMarkdown.ts
        - src/renderer/features/composer/utils/draftSanitisation.ts
        - src/renderer/features/composer/components/TipTapPromptEditor.tsx
        - src/renderer/features/composer/__tests__/composerMarkdownContract.test.ts
        - src/renderer/features/composer/__tests__/wireFormat.contract.test.ts
        - src/renderer/features/composer/__tests__/realFixtures.test.ts
      identifiers:
        # Narrowly TipTap-only per existing registry convention (one entry =
        # one demonstrated-failure surface). If a non-TipTap editor surface
        # (Lexical, Slate, contentEditable) ever ships, that adds its own
        # entry with its own demonstrated-failure surface to anchor it.
        - '@tiptap/markdown'
        - '@tiptap/extension-document'
        - '@tiptap/extension-paragraph'
        - '@tiptap/extension-hard-break'
        - EMPTY_PARAGRAPH_MARKDOWN
        - MarkdownManager
        - renderMarkdown
        - createPromptEditorExtensions
        - composerEditorFactory
        - ComposerWireMarkdown
        - getCurrentPromptMarkdown
        - getMarkdown
        - editor\.markdown\.parse
    rationale: >
      The 260501 composer @-mention bug shipped because three orthogonal upstream
      contracts inside @tiptap/markdown (Document.renderMarkdown joining children
      with '\n\n', Paragraph.renderMarkdown using EMPTY_PARAGRAPH_MARKDOWN = '&nbsp;',
      HardBreak.renderMarkdown returning '  \n') compose into a wire format that
      breaks the council service's `<@model>` regex when an empty paragraph sits
      between user content. The fix overrides each renderer per-extension via
      MarkdownManager's getExtensionField channel, but the override chain is
      brittle: an upgrade to @tiptap/markdown could change the override mechanism;
      a new editor surface that doesn't consume the shared factory could omit the
      overrides entirely; an agent removing the lint guards could re-introduce
      `editor.getMarkdown()` calls outside the wrapper. Drift mode: any of these
      three reopens the @-mention corruption class. Reviewers must (a) verify the
      4 ESLint guards still fire, (b) confirm `createPromptEditorExtensions()` is
      the single source of truth consumed by both production `useEditor` and
      tests, (c) run `composerMarkdownContract.test.ts` (86 rows) which is the
      loud-failure detector for upstream renderMarkdown drift.
    postmortems:
      - 260501_composer_tiptap_atmention_nbsp_corruption_postmortem.md

