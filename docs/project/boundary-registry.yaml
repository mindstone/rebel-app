      with live cloud fields elsewhere. The 260610 reattach race adds the
      companion TOCTOU rule: any cloud-instance write path that can restore
      mode:'cloud' must re-check cloudTeardownGeneration immediately before
      persisting credentials. Reviewers must verify status updates flow through
      the reconciler methods, local clears flow through clearCloudInstanceLocally(),
