  - id: proxy-passthrough-auth-symmetry
    category: auth-boundary
    description: Every localModelProxyServer passthrough handler (Anthropic, OpenRouter, Codex, council-member) must strip client-supplied x-api-key and authorization headers and re-inject the upstream-correct credential at egress; the PROXY_HANDLES_AUTH_SENTINEL contract MUST hold symmetrically across all handlers.
    spec_doc: docs-private/postmortems/260430_evals_s5b_cluster_anthropic_passthrough_sentinel_leak_postmortem.md
    owned_by: src/main/services/localModelProxyServer.ts
    contract_test:
      - src/main/services/__tests__/localModelProxyServer.crossHandlerAuth.test.ts
    match:
      paths:
        - src/main/services/localModelProxyServer.ts
        - src/main/services/__tests__/localModelProxyServer.crossHandlerAuth.test.ts
        - src/main/services/__tests__/localModelProxyServer.anthropicPassthrough.test.ts
        - src/core/rebelCore/proxyAuthContract.ts
        - src/core/rebelCore/clientFactory.ts
      identifiers:
        - handleAnthropicPassthrough
        - handleOpenRouterPassthrough
        - handleCodexStreamingRequest
        - injectAnthropicUpstreamAuth
        - buildPassthroughHeaders
        - PROXY_HANDLES_AUTH_SENTINEL
        - x-proxy-auth
        - x-routed-turn-id
    forbidden_terms:
      # The sentinel must NEVER appear as a literal string outside
      # proxyAuthContract.ts (the canonical producer/consumer module).
      # Any other occurrence likely means a new caller is producing or
      # comparing the literal directly, reopening the asymmetry that
      # caused the 260430 leak.
      - "'proxy-handles-auth'"
    rationale: >
      The 260430 sentinel-leak bug was an asymmetric refactor: route-table-proxy
      mode was added to clientFactory.ts (sentinel produced) but only 3 of the 4
      passthrough handlers in localModelProxyServer.ts were updated to strip and
      re-inject upstream auth at egress. handleAnthropicPassthrough forwarded the
      sentinel x-api-key plus a proxy-internal Bearer to api.anthropic.com,
      producing 401s on every Anthropic-routed eval fixture. Drift mode: a 5th
      passthrough handler (or a refactor that touches the existing 4) skips the
      strip-and-reinject at egress, or duplicates the literal sentinel string
      outside proxyAuthContract.ts. Reviewers must verify the cross-handler
      poison-key invariant test in localModelProxyServer.crossHandlerAuth.test.ts
      and confirm symmetric injection across every handler.
    postmortems:
      - 260430_evals_s5b_cluster_anthropic_passthrough_sentinel_leak_postmortem.md
      - 260417_openrouter_adhoc_auth_failure_postmortem.md

  - id: routed-subagent-header-transport-contract
    category: provider-routing
    description: >
      Any decision whose dispatchPath is local-proxy-route-table in council/ad-hoc
      routeScope (lead OR subagent) must carry x-routed-turn-id and x-routed-model
      end-to-end from route planning to proxy resolution. Decisions whose
      dispatchPath is direct-provider or none must bypass proxy identity headers
      entirely, regardless of routeScope or role, so local proxy auth and routed
      headers cannot leak to direct upstream APIs. Route-table membership is
      determined SOLELY by decision.dispatchPath; decision.transport remains the
      wire dialect axis.
    spec_doc: docs/plans/260506_routing_transport_refactor_and_council_rename.md#stage-6-concept-rename--x-council-turn-id--x-routed-turn-id
    owned_by: src/core/rebelCore/providerRouteHeaders.ts + src/core/rebelCore/providerRouting.ts + src/main/services/localModelProxyServer.ts + src/main/services/agentTurnExecutor.ts
    contract_test:
      - src/core/rebelCore/__tests__/providerRouting.invariants.test.ts
      - src/main/services/__tests__/localModelProxyServer.routing.test.ts
    match:
      paths:
        - src/core/rebelCore/providerRouteHeaders.ts
        - src/core/rebelCore/providerRouting.ts
        - src/core/rebelCore/providerRoutePlan.ts
        - src/core/rebelCore/agentTool.ts
        - src/core/services/behindTheScenesClient.ts
        - src/main/services/localModelProxyServer.ts
        - src/main/services/agentTurnExecutor.ts
        - src/core/rebelCore/__tests__/subAgentRouting.regression.test.ts
        - src/core/rebelCore/__tests__/providerRouting.invariants.test.ts
        - src/main/services/__tests__/localModelProxyServer.routing.test.ts
      identifiers:
        - x-routed-turn-id
        - x-routed-model
        - appendProxyIdentityHeaders
        - assertRouteTableRuntimeContext
        - resolveRouteProfile
        - route_required
        - decisionProxyRuntime
        - routeRuntimeContextForDecision
        - DispatchableRouteDecision
        - TerminalRouteDecision
        - kind
        - dispatchPath
        - deriveDispatchPath
        - coerceToRouteTable
        - isDispatchableDecision
        - isTerminalDecision
        - isTerminalRoutePlan
        - validateRouteDecisionShape
        - MalformedRouteDecisionError
        - isProxyDispatch
        - isRouteTableDispatch
        - isDirectDispatch
        - assertDispatchableRoutePlan
        - proxyRuntimeForDecision
        - createBtsRoutePlan
        - proxyAuthToken
    rationale: >
      Stage 6 hard-cutover replaced x-council-turn-id with x-routed-turn-id and
      made x-routed-model the canonical route-table wire signal. Drift mode #1:
      stale header names or missing x-routed-model break fail-closed route-table
      dispatch and reintroduce runtime-versus-wire routing mismatches. Drift
      mode #2 (260507): conflating turn-level routeScope (council/ad-hoc) with
      transport-based proxy inference. The discriminated-union shape now splits
      dispatchable and terminal decisions by `kind`; dispatchPath owns dispatch
      semantics for dispatchable routes (local-proxy-route-table vs
      local-proxy-passthrough vs direct-provider) while transport remains wire
      dialect only. Reviewers must verify decisionProxyRuntime and header gates
      key off dispatchPath helpers, route-table subagent decisions are born via
      the internal coerceToRouteTable path, and route-table plans carry
      routedModel plus non-empty turnId before header emission.
    postmortems:
      - 260417_openrouter_adhoc_auth_failure_postmortem.md
      - 260430_evals_s5b_cluster_anthropic_passthrough_sentinel_leak_postmortem.md
      - 260507_routing_transport_lead_proxy_conflation_postmortem.md

  - id: codex-model-dialect-axis
    category: provider-routing
    description: >
      The model-dialect axis for the localModelProxyServer Codex transport is
      type-enforced, not defensively re-checked. The ONLY model name that may
      reach EITHER Codex Responses egress site — forwardToCodexModel()
      (non-streaming) and handleCodexStreamingRequest() (streaming) — is a
      brand-typed CodexEgressModel, produced SOLELY by remapToCodexEgressModel()
      (in src/main/services/localModelProxy/classifier.ts). Both egress
      functions take the egress model as a CodexEgressModel parameter (the
      non-streaming site via the CodexEgressRequest body type, whose `model`
      field is the brand), so passing a raw `string` / `ModelProfile.model` /
      `anthropicRequest.model` to a Codex egress is a COMPILE error at the
      construction site — the brand is threaded all the way to the wire, not
      widened back to `string` at the call. remapToCodexEgressModel() is the
      single home of both defence-in-depth remaps: (1) anthropic-native
      (`claude-*` / `anthropic/claude-*`) → working-profile model (re-checked
      for Codex support) or Codex default (the REBEL-540 / PM 260429 / PM 260504
      Claude-leak guard, cascading into the REBEL-520 second-stage check) and
      (2) Codex-unsupported OpenAI model (e.g. `gpt-5.5-pro`) → supported model
      or Codex default (REBEL-520 mirror). BOTH Codex egress paths funnel
      through this single choke point: the `x-codex-turn` passthrough branch
      (classifyRequest() carries the result as the brand-typed `egress` field of
      the codex-turn RequestClassification) AND the route-resolved → Codex path
      (forwardToLocalModel / handleStreamingRequest call remapToCodexEgressModel
      before dispatching). Consumer-class dispatch in handleMessagesRequest is an
      exhaustive `switch` with an assertNever default, so a new ConsumerClass /
      ProviderTransport variant is a compile error too. New transports / model
      dialects must extend this axis (the ModelDialect union + CodexEgressModel
      brand), so the omitted-axis class stays a type error.

      Advisory (NOT type-enforced) today: the streamContract,
      structuredOutputContract, and authPlan fields of RequestClassification are
      computed but the handler still re-derives stream/output-format from the
      raw AnthropicRequest and injects auth per-branch downstream (Stage 13
      consolidates the injectors). Only the model-dialect and consumer-class
      axes are enforced as type errors; do not read those three fields as the
      source of truth until Stage 13 wires them.
    spec_doc: docs/plans/260526_hotspot-refactor-roadmap/PLAN.md#stage-12-extract-typed-requestclassification
    owned_by: src/main/services/localModelProxy/classifier.ts + src/main/services/localModelProxyServer.ts
    match:
      paths:
        - src/main/services/localModelProxy/classifier.ts
        - src/main/services/localModelProxyServer.ts
        - src/main/services/__tests__/localModelProxyServer.invariants.test.ts
        - src/core/rebelCore/providerRouting.ts
        - src/core/rebelCore/clientFactory.ts
        - src/core/services/turnPipeline/agentTurnExecute.ts
      identifiers:
        - classifyRequest
        - RequestClassification
        - remapToCodexEgressModel
        - CodexEgressModel
        - CodexEgressModelResolution
        - CodexEgressRequest
        - forwardToCodexModel
        - handleCodexStreamingRequest
        - reportCodexEgressRemap
        - classifyModelDialect
        - ModelDialect
        - CODEX_DEFAULT_MODEL
        - x-codex-turn
        - isNativeAnthropicModel
    rationale: >
      PMs 260429 (Anthropic-native model routed to the Codex proxy) and 260504
      (Claude model leaked at the proxy egress), and the live production signal
      REBEL-540 (878 events / 11 users), are all instances of the same
      omitted-axis class: a routing/remapping change preserved the
      provider/role/scope axes but dropped the model-dialect axis, so a
      `claude-*` name reached the Codex Responses endpoint verbatim. Defensive
      string checks (`model.startsWith('claude-')`) had been duplicated inline at
      the proxy egress and at several upstream guard sites (clientFactory.ts,
      providerRouting.ts, agentTurnExecute.ts) — any one of which could be
      dropped or mis-ordered without a compile failure. Stage 12 makes the axis a
      brand-typed seam: the Codex egress model can only be produced by the single
      remapper, so the guard cannot be silently removed. Drift mode: a new
      Codex-adjacent transport or a refactor that bypasses
      remapToCodexEgressModel() and assigns a raw string to the egress model —
      reviewers must verify the Codex upstream-request construction consumes the
      brand-typed egress model from classifyRequest, and that the Claude-leak
      invariant in localModelProxyServer.invariants.test.ts stays green.
    postmortems:
      - 260429_provider_routing_anthropic_native_under_codex_postmortem.md
      - 260504_codex_passthrough_claude_model_leak_resolveTargetForModel_postmortem.md

