        - cloudToken
        - lastKnownStatus
        - lastError
        - lastSyncedAt
        - errorCategory
        - degradedSince
        - lastWriter
        - CloudInstanceSettingsAdapter
        - cloud:status-changed
        - clearCloudInstanceLocally
        - cloudTeardownGeneration
        - cloudInstanceLocalModeDriftSelectors
