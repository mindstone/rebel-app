    rationale: >
      The 260430 evals s5b cluster contained five consumer-side bugs from one
      refactor that moved primitives into evals/judgePanel.ts: 5 deleted exports
      (DEFAULT_PREDICATE_MODEL, DEFAULT_MAX_QUESTION_ROUNDS, ResolvedModelTier,
