  - id: structured-output-schema
    category: provider-routing
    description: |
      Provider-neutral JsonSchemaFormat (planner outputConfig.format) is
      consumed by Anthropic, OpenAI Chat Completions, OpenAI Codex Responses,
      and the local-model proxy with three subtly different dialect rules.
      Drift in any one dialect → silent 400 / empty plan / "internal error"
      banner before tokens are produced.

      BTS request body translation contract — output_format must be translated
      to response_format on every Anthropic→OpenAI proxy branch.
      `BehindTheScenesRequestOptions.outputFormat` (Anthropic-shaped
      `output_format`) is the canonical structured-output channel for BTS
      callers (timeSaved, safety eval, summary, etc.). Every typed Anthropic→OpenAI
      translator inside `localModelProxyServer.ts` MUST translate it to
      `response_format.json_schema` via `translateAnthropicOutputFormatToOpenAIResponseFormat()`
      before handing the request to `translateChatToResponses` or any other
      upstream call. Missing the translation silently downgrades structured
      output to free-text on Codex/OpenAI-compatible upstreams.
    spec_doc: docs/project/REBEL_CORE.md#structured-output-schema-boundary
    owned_by: src/core/rebelCore/planningMode.ts
    match:
      paths:
        - src/core/rebelCore/modelClient.ts
        - src/core/rebelCore/planningMode.ts
        - src/core/rebelCore/clients/anthropicClient.ts
        - src/core/rebelCore/clients/openaiClient.ts
        - src/core/rebelCore/__tests__/planSchemaProviderCompat.test.ts
        - src/core/rebelCore/__tests__/planningMode.test.ts
        - src/core/services/behindTheScenesClient.ts
        - src/core/services/codexResponsesTranslator.ts
        - src/main/services/localModelProxyServer.ts
        - src/main/services/turnErrorRecovery.ts
        - packages/shared/src/utils/humanizeAgentError.ts
        - packages/shared/src/utils/structuredOutputErrorClassification.ts
      identifiers:
        - JsonSchemaFormat
        - PLAN_OUTPUT_FORMAT
        - PLAN_RESPONSE_SCHEMA
        - PLAN_RESPONSE_SCHEMA_OPENAI_STRICT
        - selectOpenAIPlannerSchema
        - outputConfig
        - output_format
        - response_format
        - text.format
        - additionalProperties
        - isStructuredOutputSchemaRejection
        - humanizeStructuredOutputSchemaRejection
        - validateForOpenAIStrict
        - validateForAnthropicConstrained
        - BehindTheScenesRequestOptions
        - translateAnthropicOutputFormatToOpenAIResponseFormat
        - walkSchema
        - nullableAnyOfCount
        - parameters with union types
    rationale: |
      Provider hard limits (verbatim, do not weaken):
        - Anthropic constrained decoding:
            - ≤16 parameters with union types (nullable type-arrays /
              anyOf) per schema. Verbatim error: "Schemas contains too
              many parameters with union types … limit: 16 parameters
              with unions". See 260509 postmortem.
            - Requires additionalProperties:false on every object.
            - Rejects array-form `type` combined with `enum`.
        - OpenAI strict mode:
            - Forbids top-level anyOf/oneOf/allOf/not/enum at root.
            - Requires additionalProperties:false on every object.
            - Every property in `properties` must also appear in `required`.
            - Array-form `type` cannot combine with `enum`.

      Both incidents cited in the originating diagnosis (f1b4d44b-… OpenAI,
      2feaa34a-… Anthropic) were silent: a 400 with `errorKind=invalid_request`
      rendered as "Something went wrong" instead of identifying the
      schema-rejection root cause. Reviewers must keep the
      planSchemaProviderCompat CI gate green and ensure the runtime fallback in
      runPlanningPhase (retry once without outputConfig) plus the humanized
      banner copy stay wired together.

      BTS request body translation: the local proxy is a typed boundary
      between BTS Anthropic-shaped requests and OpenAI/Codex upstream calls.
      `AnthropicRequest.output_format` and `OpenAIRequest.response_format`
      must both stay declared on the proxy interfaces so the Anthropic→OpenAI
      builders cannot silently drop structured output. Every translator branch
      must call `translateAnthropicOutputFormatToOpenAIResponseFormat()` and
      log `inboundOutputFormat` / `outboundResponseFormat` on
      success-side `[CODEX-DIAG]` / `Model response received` log lines so
      future drift is detectable from logs.
    postmortems:
      - 260506_planning_schema_provider_compat_class_bug.md
      - 260509_planner_anthropic_16_union_cap_overflow_postmortem.md

