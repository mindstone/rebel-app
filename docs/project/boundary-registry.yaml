  - id: sentry-fingerprint-for-structured-errors
    category: auth-boundary
    description: |
      All Sentry capture sites for structured (known-class) errors in the
      recovery / dispatch hot paths must route through
      `captureKnownCondition()` in `src/core/sentry/captureKnownCondition.ts`,
      not raw `getErrorReporter().captureException()`. The wrapper applies a
      registry-owned, deterministic fingerprint, sets the canonical severity
      level, runs Zod context validation, and emits the diagnostic-events
      ledger entry. Raw `captureException` calls in this surface fragment
      Sentry grouping and lose the dual-write to the diagnostic ledger.
    spec_doc: docs/plans/260526_hotspot-refactor-roadmap/PLAN.md#stage-5-fingerprinted-sentry-capture-wrapper
    owned_by: src/core/sentry/captureKnownCondition.ts
    match:
      paths:
        - src/core/sentry/captureKnownCondition.ts
        - src/core/sentry/knownConditions.ts
        - src/main/services/turnErrorRecovery.ts
        - src/main/services/turnErrorRecovery/**
        - src/core/services/behindTheScenesClient.ts
        - src/main/services/behindTheScenesClient.ts
        - src/core/services/recovery/recoveryPipeline.ts
        - src/core/services/recovery/recoveryAdapter.ts
        - src/main/services/recovery/desktopRecoveryAdapter.ts
        - cloud-service/src/services/cloudRecoveryAdapter.ts
      identifiers:
        - captureKnownCondition
        - KNOWN_CONDITIONS
        - KnownCondition
        - recovery_tool_input_too_large
        - recovery_managed_model_not_allowed
        - recovery_billing_quota
        - recovery_empty_result_anomaly
        - recovery_pause_detection_missed
        - recovery_unknown_error
        - recovery_pipeline_summary_generation_failed
        - recovery_pipeline_agent_loop_error_before_recovery
        - recovery_pipeline_agent_loop_error_after_recovery
        - recovery_pipeline_long_context_fallback_failed
        - recovery_pipeline_depth_limit_reached
        - recovery_pipeline_attempt_limit_reached
        - recovery_pipeline_no_qualifying_profile
        - recovery_pipeline_rate_limited
        - recovery_pipeline_no_messages_to_compact
        - reportKnownCondition
    rationale: |
      ModelError messages and similar structured errors carry raw 4xx JSON
      bodies, request IDs, and per-variant strategy names that fragment Sentry
      issue grouping into hundreds of near-duplicate issues when grouping is
      left to Sentry's default heuristics. The Stage 5 hotspot refactor
      (PLAN.md hotspot 2) collapsed every raw `captureException` site in
      `turnErrorRecovery.ts` onto a registry-owned fingerprint via
      `captureKnownCondition('recovery_<class>', ...)`. Drift mode: a future
      patch adds a new structured-error capture site in the recovery / BTS
      surface using `getErrorReporter().captureException(...)` directly,
      bypassing both the fingerprint registry and the diagnostic-events
      ledger. The 260424 / 260427 cluster shows this happens silently: the
      raw call still "works" — Sentry receives the event — but the issue
      lands in a per-instance bucket and downstream observability (ledger,
      dashboards keyed on fingerprint) silently degrades. Reviewers must
      verify any new capture site in the listed paths routes through
      `captureKnownCondition` and has a corresponding `KNOWN_CONDITIONS`
      registry entry with `addedAt`, `level`, `description`, and (when the
      fingerprint is parameterised) a `contextSchema`.
    postmortems:
      - 260424_sentry_model_error_fingerprint_fragmentation_postmortem.md
      - 260427_codex_disconnected_bts_sentry_fragmentation_postmortem.md
      - 260427_outer_retry_guard_system_init_and_fallback_activity_postmortem.md

  # Recommendation 7333e8c54fa1e4c7 prescribed the id
  # `safestorage_token_loader_decode_parity`; rendered kebab-case here to
  # satisfy the registry id schema (the underscore form is referenced in the
  # source postmortems for traceability).
  - id: safestorage-token-loader-decode-parity
    status: active
    category: auth-boundary
    description: >
      Every safeStorage-backed token loader must route encrypted-blob decoding
      through src/core/services/safeStorageDecode.ts; the v10/v11 byte-header
      guard, validator-gated plain decode, and per-kind dedupe-latched Sentry
      signal must stay symmetric across all loaders (cross-directory).
    spec_doc: src/core/services/safeStorageDecode.ts
    owned_by: src/core/services/safeStorageDecode.ts
    contract_test:
      - src/core/services/__tests__/safeStorageDecode.test.ts
    match:
      paths:
        - src/core/services/safeStorageDecode.ts
        - src/core/services/tokenStorage/*.ts
        # Retained @main re-export shims, plus the one real main-side loader
        # (openRouterTokenStorage.ts) — all covered by the *TokenStorage.ts glob.
        - src/main/services/*TokenStorage.ts
        # The desktop decode callsite that secure-token-store deliberately excludes.
        - src/main/services/secureTokenStore/electronSecureTokenStore.ts
      identifiers:
        - decodeStringStore
        - decodeJsonStore
        - hasSafeStorageHeader
        - captureDegradedOnce
        - safestorage_unavailable_at_read
        - isEncryptionAvailable
        - unavailable_encrypted
    rationale: >
      The on-disk token format carries NO metadata distinguishing an Electron
      safeStorage encrypted Buffer from a plain-UTF-8 Buffer (Linux without
      Secret Service / E2E mode), both base64-serialized. When
      safeStorage.isEncryptionAvailable() flips between the write session and a
      later read session (locked vault, post-resume race, FileVault transition,
      app-identity drift), a naive plain `buffer.toString('utf-8')` of
      encrypted bytes produces a U+FFFD-poisoned string that deterministically
      fails undici's `Authorization: Bearer ${token}` ByteString conversion —
      the safeStorage decode-as-UTF-8 corruption class that recurred five times
      across REBEL-174 / 260402 / 260422 / 260428 / 260506 (four-store) /
      260506 (codex parity). The centralized helper (decodeStringStore /
      decodeJsonStore) detects the v10/v11 header at the byte level, returns
      null without deleting on transient keychain-unavailability so the next
      read recovers transparently, clears-and-nulls only on genuine ciphertext
      corruption, validator-gates the plain-decode path, and dedupe-latches the
      `safestorage_unavailable_at_read` Sentry signal per token kind. Drift
      mode: a new token store (a 6th loader, or a re-home of a shim back into a
      real implementation) decodes stored bytes directly instead of routing
      through the helper, silently reintroducing the U+FFFD class. This is the
      decode-FORMAT contract; it is distinct from and complementary to the
      `secure-token-store` boundary above, which governs cross-surface storage
      ROUTING (factory/adapter centralization) and deliberately excludes the
      decode callsite this entry includes. When adding a new token store, the
      new loader must route through safeStorageDecode and be added to the
      no-restricted-syntax ESLint override block.
    postmortems:
      - 260506_safestorage_token_corruption_ufffd_postmortem.md
      - 260506_codex_safestorage_ufffd_parity_postmortem.md
      - 260402_fly_provider_token_corruption_fallback_postmortem.md

  - id: outbound-dns-threadpool-decouple
    category: provider-routing   # (or extend with a new `http-stack` category)
    description: All outbound HTTP dispatchers must use the centralized DNS resolver choice in dnsThreadpoolDecouple; desktop defaults to the OS resolver for VPN split-DNS, while c-ares remains an opt-in rollback/cloud mode.
    spec_doc: docs/project/OUTBOUND_NETWORKING_AND_SSRF.md
    owned_by: src/core/utils/dnsThreadpoolDecouple.ts
    match:
      paths:
        - "src/core/utils/dnsThreadpoolDecouple.ts"
        - "src/core/rebelCore/mcpClient.ts"
        - "src/main/bootstrap.ts"
        - "cloud-service/src/bootstrap.ts"
        - "cloud-service/src/installDnsDecouple.ts"
      identifiers:
        # NOTE: identifiers are compiled as RegExp (scripts/boundary-hints.ts),
        # so the literal `(` in the Agent constructors must be escaped.
        - "setGlobalDispatcher"
        - "new Agent\\("
        - "new UndiciAgent\\("
        - "connect\\.lookup"
        - "getDecoupledLookup"
    rationale: Node's default dns.lookup can starve on the shared libuv pool under concurrent fs/crypto/indexing, while c-ares can bypass OS/VPN scoped DNS. New undici Agents/global dispatchers must not roll their own resolver policy; they must route through the centralized selector so desktop gets OS split-DNS by default and cloud/rollback can opt into c-ares. The cloud installer must be imported before ./bootstrap (ESM eval ordering).
    postmortems:
      - 260617_dns_threadpool_starvation_connect_timeouts_postmortem.md

