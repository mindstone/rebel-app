  - id: session-event-delta-sync-contract
    category: cloud-parity
    description: >
      Session cloud sync must preserve the symmetric delta contract: append-only
      event POSTs, metadata PATCHes, capability negotiation, lean cursor seeding,
      and destructive/delete ledgers converge across desktop, cloud, and mobile.
    spec_doc: docs/plans/260509_session_event_delta_sync.md
    owned_by: src/core/services/cloudSessionMergeService.ts
    contract_test:
      - src/core/services/__tests__/cloudSessionMergeService.convergence.contract.test.ts
    match:
      paths:
        - src/core/services/cloudSessionMergeService.ts
        - cloud-service/src/routes/sessions.ts
        - cloud-client/src/cloudClient.ts
        - src/main/services/cloud/cloudOutbox.ts
        - src/main/services/cloud/cloudServiceClient.ts
        - src/shared/types/agent.ts
      identifiers:
        - X-Rebel-Capabilities
        - POST /api/sessions/:id/events
        - PATCH /api/sessions/:id
        - GET /api/sessions/:id?lean=true
        - session-event-delta-push
        - session-metadata-patch
        - messageDelta
        - messageDeletes
        - destructiveOpsApplied
        - _destructiveOps
        - _deletedMessages
        - _destructiveOpsLedger
    allowed_terms:
      - X-Rebel-Capabilities
      - POST /api/sessions/:id/events
      - PATCH /api/sessions/:id
      - GET /api/sessions/:id?lean=true
    rationale: >
      The 2026-05 mobile sync outage exposed full-session PUT as an unbounded
      cross-surface contract: payload size grew with total conversation length,
      hit the cloud body cap, then retried forever. Delta sync fixes this only
      if every surface preserves the same protocol split: append-only event
      POSTs for content, metadata PATCHes for titles/pins/drafts, capability
      fallback to legacy PUT, lean preflight cursor seeding, and pull-side
      auxiliary fields for message/delete/destructive-op convergence. Drift
      mode: a future caller reintroduces full-session content writes, drops a
      capability/header path, treats lean pulls as content-authoritative, or
      forgets the `_deletedMessages` / `_destructiveOps` ledgers; desktop,
      cloud, and mobile can then diverge silently despite individual requests
      succeeding.
    postmortems:
      - docs/plans/260509_session_event_delta_sync.md

  - id: agent-event-sequence-identity
